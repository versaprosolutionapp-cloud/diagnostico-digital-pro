const extractJSON = (raw) => {
  const text = (raw.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").replace(/```json/gi,"").replace(/```/g,"").trim();
  const start = text.indexOf("{");
  if (start===-1) throw new Error("No JSON encontrado");
  let depth=0, end=-1;
  for(let i=start;i<text.length;i++){
    if(text[i]==="{") depth++;
    else if(text[i]==="}"){depth--;if(depth===0){end=i;break;}}
  }
  if(end!==-1){try{return JSON.parse(text.slice(start,end+1));}catch(e){}}
  let partial=end!==-1?text.slice(start,end+1):text.slice(start);
  try{return JSON.parse(partial);}catch(e){
    let ob=0,ob2=0,inS=false,esc=false;
    for(let i=0;i<partial.length;i++){
      const ch=partial[i];
      if(esc){esc=false;continue;}
      if(ch==='\\'&&inS){esc=true;continue;}
      if(ch==='"'){inS=!inS;continue;}
      if(inS)continue;
      if(ch==='{')ob++;else if(ch==='}')ob--;else if(ch==='[')ob2++;else if(ch===']')ob2--;
    }
    let fixed=partial.replace(/,\s*$/,'').replace(/,\s*([}\]])/g,'$1');
    if(inS)fixed+='"';
    fixed+=']'.repeat(Math.max(0,ob2))+'}' .repeat(Math.max(0,ob));
    try{return JSON.parse(fixed);}catch(e2){throw new Error("JSON incompleto. Intenta de nuevo.");}
  }
};

const callAPI = async (system, userMsg) => {
  const res = await fetch("/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ system, userMsg }),
  });
  const raw = await res.json();
  if (raw.error) throw new Error(raw.error.message);
  return extractJSON(raw);
};
