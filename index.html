const extractJSON = (raw) => {
  let text = raw.content.filter(b => b.type === "text").map(b => b.text).join("");
  text = text.replace(/```json|```/gi, "").trim();
  const s = text.indexOf("{"), e = text.lastIndexOf("}");
  if (s !== -1 && e !== -1) text = text.slice(s, e + 1);
  return JSON.parse(text);
};

const callAPI = async (system, userMsg) => {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 4000,
      system,
      tools: [{ type: "web_search_20250305", name: "web_search" }],
      messages: [{ role: "user", content: userMsg }],
    }),
  });
  const raw = await res.json();
  if (raw.error) throw new Error(raw.error.message);
  return extractJSON(raw);
};

                React.createElement('div', { style:{ display:"flex", justifyContent:"space-between", marginBottom:6 } },
                  React.createElement('div', null,
                    React.createElement('p', { style:{ fontWeight:600, fontSize:13, margin:0 } }, c.nombre),
                    React.createElement('p', { style:{ fontSize:11, color:"var(--text-tertiary)", margin:"2px 0 0" } }, c.zona)
                  ),
                  React.createElement('span', { style:{ fontSize:11, color:"var(--text-tertiary)" } }, `📝 ${c.resenas} reseñas`)
                ),
                React.createElement('div', { style:{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:6, marginBottom:8 } },
                  ["web","gmaps","social"].map(k =>
                    React.createElement('div', { key:k, style:{ background:"var(--bg-secondary)", borderRadius:6, padding:"6px 8px" } },
                      React.createElement('p', { style:{ fontSize:10, color:"var(--text-tertiary)", margin:"0 0 4px", textTransform:"uppercase" } }, k),
                      React.createElement(ScoreBar, { score:c.scores?.[k]??0, small:true })
                    )
                  )
                ),
                React.createElement('p', { style:{ fontSize:12, color:"#2E7D32", margin:"0 0 3px" } }, `✅ ${c.fortaleza}`),
                React.createElement('p', { style:{ fontSize:12, color:"#C62828", margin:0 } }, `⚠️ ${c.debilidad}`)
              )
            )
          )),
          b2.oportunidades?.length>0 && card(React.createElement('div', null,
            label("💡 Oportunidades frente a la competencia"),
            b2.oportunidades.map((o,i) => React.createElement('p', { key:i, style:{ fontSize:13, margin:"0 0 8px", paddingLeft:12, borderLeft:`3px solid ${GOLD}`, lineHeight:1.5 } }, o))
          ), { border:`1px solid ${GOLD}50` })
        )
      ),

      view==="consultor" && React.createElement('div', null,
        card(React.createElement('div', null,
          label("🗺️ Plan de ataque"),
          b2.plan?.map((p,i) =>
            React.createElement('div', { key:i, style:{ display:"flex", gap:12, marginBottom:16, alignItems:"flex-start" } },
              React.createElement('div', { style:{ minWidth:30, height:30, borderRadius:"50%", background:NAVY, color:GOLD, display:"flex", alignItems:"center", justifyContent:"center", fontSize:13, fontWeight:700, flexShrink:0 } }, p.paso),
              React.createElement('div', { style:{ flex:1 } },
                React.createElement('div', { style:{ display:"flex", justifyContent:"space-between" } },
                  React.createElement('p', { style:{ fontWeight:500, fontSize:13, margin:"0 0 3px" } }, p.titulo),
                  React.createElement('span', { style:{ fontSize:11, color:"var(--text-tertiary)", whiteSpace:"nowrap", marginLeft:8 } }, p.dias)
                ),
                React.createElement('p', { style:{ fontSize:12, color:"var(--text-secondary)", margin:"0 0 6px", lineHeight:1.5 } }, p.detalle),
                p.servicio && React.createElement('span', { style:{ fontSize:11, background:"#E8F0FE", color:"#1A56DB", padding:"2px 10px", borderRadius:10 } }, p.servicio)
              )
            )
          )
        )),

        b2.ads && card(React.createElement('div', null,
          React.createElement('div', { style:{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 } },
            label("📢 Google Ads", { margin:0 }),
            React.createElement('span', { style:{ fontSize:12, padding:"3px 10px", borderRadius:10, background:b2.ads.conviene?"#E8F5E9":"#FFF3E0", color:b2.ads.conviene?"#2E7D32":"#E65100", fontWeight:500 } },
              b2.ads.conviene?"✓ Recomendado":"⏳ Aún no")
          ),
          React.createElement('div', { style:{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:10 } },
            [["Tipo",b2.ads.tipo],["Objetivo",b2.ads.objetivo],["Presupuesto",b2.ads.presupuesto]].map(([l,v]) => v &&
              React.createElement('div', { key:l, style:{ background:"var(--bg-secondary)", borderRadius:8, padding:"8px 10px" } },
                React.createElement('p', { style:{ fontSize:10, color:"var(--text-tertiary)", margin:"0 0 3px", textTransform:"uppercase" } }, l),
                React.createElement('p', { style:{ fontSize:12, fontWeight:500, margin:0 } }, v)
              )
            )
          ),
          b2.ads.kw?.length>0 && React.createElement('div', { style:{ marginBottom:8 } },
            React.createElement('p', { style:{ fontSize:12, color:"var(--text-secondary)", margin:"0 0 6px" } }, "Palabras clave:"),
            React.createElement('div', { style:{ display:"flex", flexWrap:"wrap", gap:6 } },
              b2.ads.kw.map((kw,i) => React.createElement('span', { key:i, style:{ fontSize:11, background:NAVY+"12", color:NAVY, padding:"3px 10px", borderRadius:20 } }, kw))
            )
          ),
          b2.ads.errores?.length>0 && React.createElement('div', null,
            React.createElement('p', { style:{ fontSize:12, color:"var(--text-secondary)", margin:"0 0 4px" } }, "⛔ Errores a evitar:"),
            b2.ads.errores.map((e,i) => React.createElement('p', { key:i, style:{ fontSize:12, margin:"0 0 3px", paddingLeft:12, color:"#C62828" } }, `• ${e}`))
          )
        )),

        card(React.createElement('div', null,
          React.createElement('div', { style:{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 } },
            label("💲 Cotización estimada", { margin:0 }),
            React.createElement('button', { onClick:()=>setEditingPrices(!editingPrices),
              style:{ fontSize:12, padding:"4px 10px", borderRadius:6, border:"0.5px solid var(--border)", background:"var(--bg-secondary)", cursor:"pointer", color:"var(--text-secondary)" } },
              editingPrices?"✓ Listo":"✏️ Editar precios")
          ),
          Object.entries(prices).map(([servicio,precio]) => {
            const enPlan = b2.plan?.some(p=>p.servicio===servicio);
            return React.createElement('div', { key:servicio, style:{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"7px 0", borderBottom:"0.5px solid var(--border)", opacity:enPlan?1:0.35 } },
              React.createElement('p', { style:{ fontSize:12, margin:0, fontWeight:enPlan?500:400, color:enPlan?"var(--text-primary)":"var(--text-tertiary)" } }, (enPlan?"✓ ":"")+servicio),
              editingPrices
                ? React.createElement('input', { type:"number", value:precio, onChange:e=>setPrices(p=>({...p,[servicio]:Number(e.target.value)})),
                    style:{ width:70, textAlign:"right", padding:"3px 6px", borderRadius:6, border:"0.5px solid var(--border)", fontSize:12, background:"var(--bg-secondary)" } })
                : React.createElement('p', { style:{ fontSize:13, fontWeight:enPlan?700:400, margin:0, color:enPlan?NAVY:"var(--text-tertiary)" } }, `$${precio}`)
            );
          }),
          React.createElement('div', { style:{ display:"flex", justifyContent:"space-between", marginTop:12, paddingTop:10, borderTop:`2px solid ${GOLD}` } },
            React.createElement('p', { style:{ fontWeight:600, fontSize:15, margin:0 } }, "Total estimado"),
            React.createElement('p', { style:{ fontWeight:700, fontSize:20, color:NAVY, margin:0 } }, `$${totalPlan.toLocaleString()}`)
          )
        )),

        card(React.createElement('div', null,
          React.createElement('div', { style:{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 } },
            label("💬 Mensaje de cierre (WhatsApp)", { margin:0 }),
            React.createElement('button', { onClick:()=>{ navigator.clipboard.writeText(b2.mensaje_cierre||""); setCopied(true); setTimeout(()=>setCopied(false),2000); },
              style:{ fontSize:12, padding:"4px 10px", borderRadius:6, border:"0.5px solid var(--border)", background:"var(--bg-secondary)", cursor:"pointer", color:"var(--text-secondary)" } },
              copied?"✓ Copiado":"Copiar")
          ),
          React.createElement('div', { style:{ background:"#E8F5E9", borderRadius:8, padding:"12px 14px" } },
            React.createElement('p', { style:{ fontSize:13, lineHeight:1.8, margin:0, color:"#1B5E20", whiteSpace:"pre-wrap" } }, b2.mensaje_cierre)
          )
        ))
      ),

      React.createElement('p', { style:{ textAlign:"center", fontSize:11, color:"var(--text-tertiary)", marginTop:20 } },
        "VersaPro Solution TX LLC · Diagnóstico Digital Pro · Powered by Claude AI")
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
